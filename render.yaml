# Render Blueprint - cancagua-frontend (SSR Only)
# https://render.com/docs/blueprint-spec
#
# Este servicio solo sirve el frontend con SSR.
# Toda la logica de negocio (API, BD, WebPay, emails) vive en cms.cancagua.cl

services:
  - type: web
    name: cancagua-frontend
    runtime: node
    region: oregon
    plan: free
    buildCommand: rm -rf node_modules && pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # URL de la API del CMS (usado por el cliente tRPC)
      - key: VITE_API_BASE_URL
        value: https://cms.cancagua.cl
    healthCheckPath: /
    autoDeploy: true
