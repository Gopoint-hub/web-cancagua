# Render Blueprint - cancagua-web
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: cancagua-web
    runtime: node
    region: oregon # or your preferred region
    plan: free # or starter, standard, etc.
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Database - TiDB Cloud Serverless
      - key: DATABASE_URL
        sync: false # Set manually in Render dashboard
      # Authentication
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_APP_ID
        sync: false
      - key: OWNER_OPEN_ID
        sync: false
      # AI Services
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false # For Whisper and DALL-E
      # Cloudinary Storage
      - key: CLOUDINARY_URL
        sync: false
      # Or use individual Cloudinary variables:
      # - key: CLOUDINARY_CLOUD_NAME
      #   sync: false
      # - key: CLOUDINARY_API_KEY
      #   sync: false
      # - key: CLOUDINARY_API_SECRET
      #   sync: false
      # Email Service
      - key: RESEND_API_KEY
        sync: false
    healthCheckPath: /
    autoDeploy: true
